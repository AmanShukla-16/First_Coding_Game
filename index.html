<!DOCTYPE html>
<html>
<head>
<title>Bug Hunter - Learn Coding Game</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="card">

<h1>🐞 Bug Hunter</h1>
<h3>Learn Coding by Fixing Bugs (20 Levels)</h3>

<div class="stats">
  <p id="level">Level 1</p>
  <p id="score">Score: 0</p>
  <p id="timer">Time: 15s</p>
</div>

<pre id="codeBox"></pre>

<div id="options"></div>

<div id="result"></div>

<button onclick="nextQ()">Next ➜</button>
<button onclick="restartGame()">🔁 Try Again</button>

</div>

<script src="script.js"></script>

</body>
</html>
